<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root{
    --navy:#10243f; --navy2:#1b3a63; --blue:#2f6fed; --sky:#e8f1ff;
    --green:#16a34a; --amber:#f59e0b; --gray:#64748b; --line:#e2e8f0;
    --bg:#f4f7fb; --card:#fff;
  }
  body{ font-family:'Pretendard','Malgun Gothic',sans-serif; background:var(--bg); color:#1e293b; line-height:1.5; }
  .hidden{ display:none !important; }
  button{ font-family:inherit; cursor:pointer; }

  /* ===== Login ===== */
  #login{ min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg,#10243f,#2f6fed); }
  .login-box{ background:#fff; border-radius:20px; padding:40px; width:380px; box-shadow:0 20px 60px rgba(0,0,0,.3); text-align:center; }
  .login-box h1{ color:var(--navy); font-size:24px; margin-bottom:4px; }
  .login-box .sub{ color:var(--gray); font-size:13px; margin-bottom:24px; }
  .login-box input{ width:100%; padding:13px 15px; border:1.5px solid var(--line); border-radius:11px; font-size:15px; margin-bottom:12px; }
  .login-box input:focus{ outline:none; border-color:var(--blue); }
  .btn-primary{ width:100%; padding:13px; background:var(--blue); color:#fff; border:none; border-radius:11px; font-size:15px; font-weight:700; }
  .btn-primary:hover{ background:#1d5bd6; }
  .login-hint{ margin-top:18px; font-size:12px; color:var(--gray); background:var(--sky); padding:10px; border-radius:9px; }
  .err{ color:#dc2626; font-size:13px; margin-bottom:10px; min-height:18px; }

  /* ===== Top bar ===== */
  .topbar{ background:var(--navy); color:#fff; padding:14px 22px; display:flex; align-items:center; justify-content:space-between; }
  .topbar .brand{ font-weight:800; font-size:17px; letter-spacing:.3px; }
  .topbar .brand span{ color:#7eb0ff; }
  .topbar .right{ display:flex; align-items:center; gap:14px; font-size:14px; }
  .topbar button{ background:rgba(255,255,255,.15); color:#fff; border:none; padding:7px 14px; border-radius:8px; font-size:13px; }
  .topbar button:hover{ background:rgba(255,255,255,.28); }

  .wrap{ max-width:1080px; margin:0 auto; padding:24px 20px 60px; }

  /* ===== Student dashboard ===== */
  .hero{ background:linear-gradient(135deg,var(--navy2),var(--blue)); border-radius:20px; padding:26px 28px; color:#fff; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
  .hero h2{ font-size:26px; }
  .hero .lvls{ display:flex; gap:10px; flex-wrap:wrap; }
  .lvl-chip{ background:rgba(255,255,255,.16); border-radius:13px; padding:10px 16px; text-align:center; min-width:84px; }
  .lvl-chip .t{ font-size:11px; opacity:.85; }
  .lvl-chip .v{ font-size:18px; font-weight:800; margin-top:2px; }
  .lvl-chip .r{ font-size:10px; opacity:.8; margin-top:3px; }
  .vocab-chip{ background:rgba(255,255,255,.18); border:1.5px solid rgba(255,255,255,.35); border-radius:14px; padding:12px 18px; min-width:230px; }
  .vocab-chip .t{ font-size:12px; opacity:.9; font-weight:700; letter-spacing:.3px; }
  .vocab-chip .v{ font-size:15px; margin-top:3px; }
  .vocab-chip .v b{ font-size:30px; font-weight:900; }
  .vocab-chip .v .goal{ font-size:13px; opacity:.85; }
  .vocab-chip .vbar{ height:9px; background:rgba(255,255,255,.25); border-radius:6px; overflow:hidden; margin-top:9px; }
  .vocab-chip .vbar > div{ height:100%; background:linear-gradient(90deg,#ffe177,#ffb547); border-radius:6px; transition:width 1s cubic-bezier(.2,.8,.2,1); }
  .vocab-chip .vsub{ font-size:11px; opacity:.85; margin-top:6px; }

  .grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:18px; margin-top:20px; }
  @media(max-width:760px){ .grid{ grid-template-columns:1fr; } .hero{ flex-direction:column; align-items:flex-start; } }
  .card{ background:var(--card); border-radius:16px; padding:20px 22px; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .card h3{ font-size:15px; color:var(--navy); margin-bottom:14px; display:flex; align-items:center; gap:7px; }
  .card h3 .dot{ width:8px; height:8px; border-radius:50%; background:var(--blue); }

  .today-row{ display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px dashed var(--line); font-size:14px; }
  .today-row:last-child{ border:none; }
  .today-row b{ color:var(--navy); }
  .book-name{ font-size:18px; font-weight:800; color:var(--blue); }

  /* progress bars */
  .pbar-wrap{ margin:14px 0; }
  .pbar-label{ display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; }
  .pbar{ height:16px; background:#eef2ف7; background:#eef2f7; border-radius:10px; overflow:hidden; }
  .pbar > div{ height:100%; border-radius:10px; transition:width .9s cubic-bezier(.2,.8,.2,1); }
  .fill-word{ background:linear-gradient(90deg,#2f6fed,#7eb0ff); }
  .fill-hw{ background:linear-gradient(90deg,#16a34a,#5fd98a); }

  /* week goals */
  .weeks{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
  .week-box{ border:1.5px solid var(--line); border-radius:13px; padding:13px; position:relative; }
  .week-box.done{ border-color:var(--green); background:#f0fdf4; }
  .week-box .wk{ font-size:12px; font-weight:800; color:var(--gray); }
  .week-box.done .wk{ color:var(--green); }
  .week-box .goal{ font-size:13px; margin-top:6px; min-height:34px; }
  .week-box .badge{ position:absolute; top:11px; right:11px; font-size:11px; padding:3px 8px; border-radius:20px; background:#f1f5f9; color:var(--gray); font-weight:700; }
  .week-box.done .badge{ background:var(--green); color:#fff; }

  .predict{ background:linear-gradient(135deg,#fff7ed,#fef3c7); border:1.5px solid #fcd34d; border-radius:14px; padding:18px 20px; margin-top:18px; font-size:15px; }
  .predict b{ color:#b45309; }
  .predict .big{ font-size:22px; font-weight:800; color:#92400e; }

  /* completion ring */
  .ring-wrap{ display:flex; align-items:center; gap:20px; }
  .ring{ position:relative; width:120px; height:120px; }
  .ring svg{ transform:rotate(-90deg); }
  .ring .pct{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .ring .pct .n{ font-size:26px; font-weight:800; color:var(--navy); }
  .ring .pct .l{ font-size:11px; color:var(--gray); }

  .empty{ text-align:center; color:var(--gray); padding:50px 20px; }

  /* ===== Teacher panel ===== */
  .tabs{ display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }

  /* notice board */
  .notice-board{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
  @media(max-width:760px){ .notice-board{ grid-template-columns:1fr; } }
  .notice-card{ border-radius:16px; padding:18px 20px; }
  .notice-card.summary{ background:linear-gradient(135deg,#eef4ff,#e0ecff); border:1.5px solid #c7dbff; }
  .notice-card.overdue{ background:linear-gradient(135deg,#fff7ed,#ffedd5); border:1.5px solid #fed7aa; }
  .notice-card .nt{ font-size:15px; font-weight:800; color:var(--navy); display:flex; align-items:center; gap:7px; margin-bottom:0; cursor:pointer; list-style:none; user-select:none; }
  .notice-card summary.nt::-webkit-details-marker{ display:none; }
  .notice-card summary.nt::before{ content:'▸'; color:#94a3b8; transition:transform .2s; }
  .notice-card[open] summary.nt::before{ transform:rotate(90deg); }
  details.notice-card[open] .nt{ margin-bottom:0; }
  .notice-card .nt .cnt{ margin-left:auto; font-size:12px; font-weight:700; background:#fff; padding:3px 10px; border-radius:20px; color:#475569; }
  .notice-card .nbody{ font-size:13px; color:#334155; line-height:1.6; }
  .notice-card .nbody > div{ margin-bottom:3px; }
  .overdue-row{ display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.6); border-radius:9px; padding:7px 10px; margin-bottom:5px !important; }
  .overdue-row .rank{ width:20px; height:20px; background:#f97316; color:#fff; border-radius:50%; font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .overdue-row .nm{ font-weight:700; color:var(--navy); flex:1; }
  .overdue-row .dt{ font-size:12px; color:#64748b; }
  .overdue-row .mo{ font-size:11px; font-weight:700; color:#c2410c; background:#ffedd5; padding:2px 8px; border-radius:20px; }
  .tab{ padding:9px 18px; border-radius:10px; background:#fff; border:1.5px solid var(--line); font-size:14px; font-weight:600; color:var(--gray); }
  .tab.active{ background:var(--navy); color:#fff; border-color:var(--navy); }

  .cls-block{ margin-bottom:22px; }
  .cls-block-title{ font-size:18px; font-weight:900; color:var(--navy); margin:0 0 12px; padding-left:10px; border-left:4px solid var(--blue); }
  .cls-cols{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .cls-col-head{ font-size:14px; font-weight:800; color:var(--navy2); margin-bottom:10px; }
  .cls-col-head .cls-time{ font-size:11px; color:var(--gray); font-weight:600; margin-left:4px; }
  .cls-col-head .cls-cnt{ font-size:11px; background:var(--sky); color:var(--blue); padding:2px 8px; border-radius:7px; font-weight:800; margin-left:4px; }
  .cls-col .stu-list{ grid-template-columns:1fr; gap:10px; }
  @media(max-width:720px){ .cls-cols{ grid-template-columns:1fr; } }
  .stu-list{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
  .stu-card{ background:#fff; border-radius:14px; padding:16px; border:1.5px solid var(--line); cursor:pointer; transition:.15s; }
  .stu-card:hover{ border-color:var(--blue); transform:translateY(-2px); box-shadow:0 6px 18px rgba(47,111,237,.12); }
  .stu-card .nm{ font-size:17px; font-weight:800; color:var(--navy); }
  .stu-card .id{ font-size:12px; color:var(--gray); }
  .stu-card .bk{ font-size:13px; margin-top:8px; color:var(--blue); font-weight:600; }
  .stu-card .mini{ display:flex; gap:6px; margin-top:9px; }
  .stu-card .mini span{ font-size:11px; background:var(--sky); color:var(--navy2); padding:3px 8px; border-radius:7px; font-weight:700; }

  .form-card{ background:#fff; border-radius:16px; padding:24px; box-shadow:0 2px 10px rgba(20,40,80,.05); }
  .form-card h3{ color:var(--navy); margin-bottom:18px; font-size:18px; }
  .frow{ display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-bottom:14px; }
  .frow.three{ grid-template-columns:repeat(3,1fr); }
  .frow.four{ grid-template-columns:repeat(4,1fr); }
  @media(max-width:680px){ .frow,.frow.three,.frow.four{ grid-template-columns:1fr; } }
  .field label{ display:block; font-size:12px; font-weight:700; color:var(--gray); margin-bottom:5px; }
  .field input,.field select{ width:100%; padding:10px 12px; border:1.5px solid var(--line); border-radius:9px; font-size:14px; }
  .field input:focus,.field select:focus{ outline:none; border-color:var(--blue); }

  .wk-edit{ border:1.5px solid var(--line); border-radius:12px; padding:14px; margin-bottom:10px; }
  .mock-grade{ border:1.5px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
  .mock-grade-title{ font-weight:800; color:var(--navy); margin-bottom:8px; }
  .mock-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:6px; }
  .mock-item{ display:flex; align-items:center; gap:6px; background:#f8fafc; border-radius:8px; padding:5px 8px; font-size:13px; flex-wrap:wrap; }
  .mock-item input[type=checkbox]{ width:16px; height:16px; accent-color:#6366f1; flex-shrink:0; }
  .mock-item .ml{ flex:1; }
  .mock-item .mock-score{ width:54px; padding:4px 6px; border:1px solid var(--line); border-radius:6px; font-size:12px; }
  .mock-hw{ display:flex; gap:8px; align-items:center; padding-left:6px; border-left:1px dashed var(--line); }
  .mock-hwchk{ display:flex; align-items:center; gap:3px; font-size:11px; color:var(--gray); cursor:pointer; white-space:nowrap; }
  .mock-hwchk input[type=checkbox]{ width:14px; height:14px; }
  .wk-edit .head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .wk-edit .head b{ color:var(--navy); }
  .check-toggle{ display:flex; align-items:center; gap:6px; font-size:13px; font-weight:700; color:var(--gray); cursor:pointer; user-select:none; }
  .check-toggle input{ width:18px; height:18px; accent-color:var(--green); }

  .actions{ display:flex; gap:10px; margin-top:20px; flex-wrap:wrap; }
  .btn{ padding:11px 20px; border-radius:10px; border:none; font-size:14px; font-weight:700; }
  .btn-save{ background:var(--blue); color:#fff; }
  .btn-save:hover{ background:#1d5bd6; }
  .btn-kakao{ background:#fae100; color:#3a1d1d; }
  .btn-kakao:hover{ background:#f2d800; }
  .btn-del{ background:#fee2e2; color:#dc2626; }
  .btn-ghost{ background:#f1f5f9; color:var(--gray); }

  .month-pick{ display:flex; align-items:center; gap:8px; }

  /* kakao modal */
  .modal-bg{ position:fixed; inset:0; background:rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal{ background:#fff; border-radius:18px; padding:26px; width:480px; max-width:100%; max-height:85vh; overflow:auto; }
  .modal h3{ color:var(--navy); margin-bottom:6px; }
  .modal .sub{ font-size:12px; color:var(--gray); margin-bottom:14px; }
  .modal textarea{ width:100%; min-height:280px; border:1.5px solid var(--line); border-radius:11px; padding:14px; font-size:13px; line-height:1.7; font-family:inherit; resize:vertical; }
  .toast{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff; padding:12px 22px; border-radius:30px; font-size:14px; z-index:60; box-shadow:0 8px 24px rgba(0,0,0,.25); }
  .seed-note{ font-size:12px; color:var(--gray); margin-top:8px; }
</style>

<body>

<!-- ============ LOGIN ============ -->
<div id="login">
  <div class="login-box">
    <h1>조민규영어 <span style="color:#2f6fed">학습 대시보드</span></h1>
    <div class="sub">아이디로 로그인하세요</div>
    <div class="err" id="loginErr"></div>
    <input type="text" id="loginId" placeholder="아이디 (예: hong / teacher)" autocomplete="off">
    <input type="password" id="loginPw" placeholder="비밀번호">
    <button class="btn-primary" onclick="doLogin()">로그인</button>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <div class="topbar">
    <div class="brand">조민규영어 <span>대시보드</span></div>
    <div class="right">
      <span id="cloudStatus" style="font-size:12px;opacity:.8">☁️ 연결 중…</span>

  </div>
  <div class="wrap" id="content"></div>
</div>

<script>
/* ============================================================
   DATA LAYER  (in-memory; persists across session via JS object)
   ============================================================ */
const MONTH_WEEKS = {1:4,2:4,3:5,4:4,5:4,6:5,7:4,8:4,9:5,10:4,11:4,12:5}; // 월별 주차 수
const todayMonth = new Date().getMonth()+1;

/* 단어책 목록 (이름 / 대상학년 / 총 Day) */
const VOCAB_BOOKS = [
  {name:"능률중등기본", grade:"초6-중1", days:50},
  {name:"능률중등필수", grade:"중1-2", days:50},
  {name:"능률중등어원", grade:"중2", days:30},
  {name:"능률중등고난도", grade:"중2-3", days:40},
  {name:"능률고등기본", grade:"중3-고1", days:40},
  {name:"능률고등어원", grade:"중3-고1", days:60},
  {name:"어원2023", grade:"중3-고1", days:60},
  {name:"고교필수2000", grade:"고1", days:70},
  {name:"능률수능필수", grade:"고1", days:60},
  {name:"블랙라벨 1등급", grade:"고2", days:50},
  {name:"5개년 EBS 수능 영단어", grade:"고2-3", days:50}
];
function bookInfo(name){ return VOCAB_BOOKS.find(b=>b.name===name); }

/* 문법 교재 (이름 / 대상학년 / 챕터목록) */
const GRAMMAR_BOOKS = [
  {name:"해커스중학영문법 1학년", grade:"중1", chapters:[
    "be동사","일반동사","시제","조동사","문장의 형식","다양한 문장의 종류","to부정사","동명사",
    "명사와 관사","대명사","형용사","부사","비교구문","전치사","접속사"]},
  {name:"해커스중학영문법 2학년", grade:"중2", chapters:[
    "문장의 형식","다양한 문장의 종류","시제","조동사","수동태","부정사","동명사","분사",
    "명사와 관사","대명사","형용사","부사","비교구문","전치사","접속사","관계사","가정법","일치·화법·도치"]},
  {name:"해커스중학영문법 3학년", grade:"중3", chapters:[
    "문장의 형식","시제","조동사","수동태","부정사","동명사","분사","명사와 대명사",
    "형용사와 부사","비교구문","전치사","접속사","관계사","가정법","일치와 화법","특수구문"]},
  {name:"해커스고등영문법", grade:"고1", chapters:[
    "문장의 형식","시제","조동사","수동태","명사/관사/대명사","형용사와 부사","전치사","부정사",
    "동명사","분사","관계사","접속사","비교구문","가정법","일치와 화법","특수구문"]}
];
function grammarInfo(name){ return GRAMMAR_BOOKS.find(b=>b.name===name); }

/* 서술형 교재 (이름 / 대상학년 / 단원목록) */
const RANK77 = [
  "주어-동사의 수일치 Ⅰ","주어-동사의 수일치 Ⅱ","능동 vs. 수동_단순시제 Ⅰ","능동 vs. 수동_단순시제 Ⅱ",
  "현재분사 vs. 과거분사_명사 수식","분사구문","동사+목적어+보어 Ⅰ","동사+목적어+보어 Ⅱ",

/* ============================================================
   PERSISTENCE  (Firebase Firestore 클라우드 저장)
   ============================================================ */
const SEED_DB = JSON.parse(JSON.stringify(DB)); // 최초 35명 시드 보관
const DOC_REF_PATH = ["appdata","main"];
let cloudReady = false;

function cloudDoc(){
  return window.FB.doc(window.FB.db, DOC_REF_PATH[0], DOC_REF_PATH[1]);
}

async function saveDB(){
  // 항상 로컬에도 캐시
  try{ localStorage.setItem("jomingyu_dashboard_v1", JSON.stringify(DB)); }catch(e){}
  if(!cloudReady || !window.FB) return;
  try{
    await window.FB.setDoc(cloudDoc(), { payload: JSON.stringify(DB) });
  }catch(e){ console.warn("클라우드 저장 실패", e); }
}

function applyCloudPayload(raw){
  try{
    const data = JSON.parse(raw);
    if(data && data.students){ DB = data; return true; }
  }catch(e){}
  return false;
}

async function initCloud(){
  if(!window.FB){ // SDK 미로드 시 로컬만
    try{ const raw=localStorage.getItem("jomingyu_dashboard_v1"); if(raw) applyCloudPayload(raw); }catch(e){}
    return;
  }
  cloudReady = true;
  try{
    const snap = await window.FB.getDoc(cloudDoc());
    if(snap.exists() && snap.data().payload){
      applyCloudPayload(snap.data().payload);
    }else{
      // 클라우드가 비어있으면 35명 시드를 한 번 업로드
      DB = JSON.parse(JSON.stringify(SEED_DB));
      await window.FB.setDoc(cloudDoc(), { payload: JSON.stringify(DB) });
    }
  }catch(e){
    console.warn("클라우드 불러오기 실패, 로컬 사용", e);
    try{ const raw=localStorage.getItem("jomingyu_dashboard_v1"); if(raw) applyCloudPayload(raw); }catch(_){}
  }
  // 실시간 동기화: 다른 PC에서 바뀌면 즉시 반영
  try{
    window.FB.onSnapshot(cloudDoc(), (snap)=>{
      if(snap.exists() && snap.data().payload){
        const before = JSON.stringify(DB);
        applyCloudPayload(snap.data().payload);
        if(JSON.stringify(DB)!==before && session){
          if(session.role==='teacher') renderTeacher();
          else if(session.role==='student' && DB.students[session.id]) renderStudent(session.id);
        }
      }
    });
  }catch(e){}
  const st=document.getElementById('cloudStatus');
  if(st){ st.textContent="☁️ 클라우드 연결됨"; st.style.color="#7eecb0"; }
}

// SDK 준비되면 클라우드 초기화
if(window.FB){ initCloud(); }
else { window.addEventListener('fb-ready', initCloud, {once:true}); }

function doLogin(){
  const id = document.getElementById('loginId').value.trim().toLowerCase();
  const pw = document.getElementById('loginPw').value;
  const err = document.getElementById('loginErr');
  err.textContent = "";
  if(id==="teacher" && pw===DB.teacher.pw){
    session={role:'teacher'}; enterApp(); return;
  }
  if(DB.students[id] && DB.students[id].pw===pw){
    session={role:'student', id}; enterApp(); return;
  }
  err.textContent = "아이디 또는 비밀번호가 올바르지 않습니다.";
}
document.getElementById('loginPw').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

function enterApp(){
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  if(session.role==='teacher'){
    document.getElementById('who').textContent = "👩‍🏫 선생님";
    renderTeacher();
  }else{
    document.getElementById('who').textContent = "🎒 "+DB.students[session.id].name;
    renderStudent(session.id);
  }
}
function logout(){
  session=null; editingId=null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
  document.getElementById('loginId').value=""; document.getElementById('loginPw').value="";
}

function studentClassKey(id){
  const s = DB.students[id];
  if(s && s.classGroup && CLASS_GROUPS[s.classGroup]) return s.classGroup;
  if(CLASS_ASSIGN[id]) return CLASS_ASSIGN[id];
  if(s && s.name){
    const nm = s.name.replace(/\s+/g,'').trim();
    if(CLASS_ASSIGN_BY_NAME[nm]) return CLASS_ASSIGN_BY_NAME[nm];
  }
  return null;
}
function classLabel(id){
  const k = studentClassKey(id);
  return k ? CLASS_GROUPS[k].label : '미배정';
}
// 오늘 요일 기준 우선 노출할 day 그룹: 월(1)금(5)->monfri, 화(2)목(4)->tuethu, 그 외->monfri
function todayDayGroup(){
  const d = new Date().getDay(); // 0일 1월 2화 3수 4목 5금 6토
  if(d===2 || d===4) return 'tuethu';
  return 'monfri';
}

function lvWithGrade(lv){
  if(!lv) return lv||'';
  const map={ "Lv.2":"초3-4","Lv.3":"초5-6","Lv.4":"중1","Lv.5":"중2","Lv.6":"중3","Lv.7":"고1","Lv.8":"고2","Lv.9":"고3" };
  const g = map[lv];
  return g ? `${lv}(${g})` : lv;
}
function lnOpts(sel){
  const names=["L1 유치~초2","L2 초3~4","L3 초5~6","L4 중1","L5 중2","L6 중3","L7 고1","L8 고2","L9 고3"];
  return names.map((nm,i)=>`<option value="${i+1}" ${sel==(i+1)?'selected':''}>${nm}</option>`).join('');
}

function finishDate(s){
  // startYear/startMonth + bookMonths -> 종료 시점
  let y=s.startYear, m=s.startMonth + (s.bookMonths-1);
  y += Math.floor((m-1)/12);
  m = ((m-1)%12)+1;
  return {y,m};
}

/* ============================================================
   CHARTS (NELT)
   ============================================================ */
const L_LABELS = ["L1\n유치~초2","L2\n초3~4","L3\n초5~6","L4\n중1","L5\n중2","L6\n중3","L7\n고1","L8\n고2","L9\n고3"];

function drawCharts(s){
  const ln = s.levelNum || {word:5,grammar:5,reading:5,listening:5};
  drawRadar(s, ln);
  // 종합 위치 곡선
  const on = s.overallNum || Math.round((ln.word+ln.grammar+ln.reading+ln.listening)/4);
  document.getElementById('overallCurveBox').innerHTML = curveSVG(on, "#2f6fed", true);
  // 영역별
  const areas=[["어휘",ln.word,"#f59e0b"],["문법",ln.grammar,"#8b5cf6"],["듣기",ln.listening,"#16a34a"],["독해",ln.reading,"#2f6fed"]];
  let html="";
  areas.forEach(([nm,v,col])=>{
    html+=`<div><div style="font-size:13px;font-weight:700;color:#1e293b;margin-bottom:4px">${nm} <span style="color:${col}">${L_LABELS[(v||1)-1].split("\\n")[0]}</span></div>${curveSVG(v,col,false)}</div>`;
  });
  document.getElementById('areaCurvesBox').innerHTML = html;
}

/* 종 모양 분포 곡선 + 현재 위치 + L9 목표 */
function curveSVG(level, color, big){
  const W = big?640:300, H = big?180:130, padL=24, padR=24, padB=big?34:26, padT=14;
  const n=9, plot=W-padL-padR;
  const x = i => padL + plot*(i/(n-1));
  // 종 모양(가운데가 높은 분포) y값 0~1
  const peak=4; // L5 부근 최빈
  const bell = i => Math.exp(-Math.pow((i-peak)/2.0,2));
  const yTop=padT, yBot=H-padB, h=yBot-yTop;
  const y = v => yBot - v*h*0.82;

  let path="";
  for(let i=0;i<n;i++){ path += (i===0?"M":"L") + x(i).toFixed(1) + " " + y(bell(i)).toFixed(1) + " "; }

  const curIdx=(level||1)-1, goalIdx=8;
  // x labels
  let labels="";
  for(let i=0;i<n;i++){
    const parts=L_LABELS[i].split("\\n");
    labels+=`<text x="${x(i)}" y="${H-padB+13}" font-size="${big?10:8}" fill="#94a3b8" text-anchor="middle">${parts[0]}</text>`;
    if(big) labels+=`<text x="${x(i)}" y="${H-padB+25}" font-size="8" fill="#cbd5e1" text-anchor="middle">${parts[1]}</text>`;
  }
  // 목표 라인 (L9)
  const goalLine=`<line x1="${x(goalIdx)}" y1="${yTop}" x2="${x(goalIdx)}" y2="${yBot}" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="${x(goalIdx)}" y="${yTop+4}" font-size="${big?10:8}" fill="#16a34a" text-anchor="end" font-weight="700">🎯목표</text>`;
  // 현재 위치
  const cx=x(curIdx), cy=y(bell(curIdx));
  const cur=`<line x1="${cx}" y1="${cy}" x2="${cx}" y2="${yBot}" stroke="${color}" stroke-width="2"/>
    <circle cx="${cx}" cy="${cy}" r="${big?7:5}" fill="${color}" stroke="#fff" stroke-width="2"/>
    <text x="${cx}" y="${cy-10}" font-size="${big?11:9}" fill="${color}" text-anchor="middle" font-weight="800">현재</text>`;
  // 현재→목표 화살표 (big만)
  let arrow="";
  if(big && curIdx<goalIdx){
    const ay=yBot-6;
    arrow=`<line x1="${cx+8}" y1="${ay}" x2="${x(goalIdx)-8}" y2="${ay}" stroke="#22c55e" stroke-width="2" marker-end="url(#arr)"/>
    <text x="${(cx+x(goalIdx))/2}" y="${ay-5}" font-size="10" fill="#16a34a" text-anchor="middle" font-weight="700">앞으로 ${goalIdx-curIdx}단계</text>`;
  }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" xmlns="http://www.w3.org/2000/svg">
    <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#22c55e"/></marker>
    <linearGradient id="g${color.replace('#','')}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity="0.18"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${path} L${x(n-1)} ${yBot} L${x(0)} ${yBot} Z" fill="url(#g${color.replace('#','')})"/>
    <path d="${path}" fill="none" stroke="#cbd5e1" stroke-width="2"/>
    ${goalLine}${arrow}${cur}${labels}
  </svg>`;
}

/* 레이더(오각형이 아닌 4각) */
function drawRadar(s, ln){
  const size=300, c=size/2, R=105, max=9;
  const axes=[["어휘",ln.word],["문법",ln.grammar],["독해",ln.reading],["듣기",ln.listening]];
  const ang=i => (Math.PI/2) + i*(2*Math.PI/4) * -1; // start top, clockwise
  const pt=(i,r)=>[c+r*Math.cos(ang(i)), c-r*Math.sin(ang(i))];

  let grid="";
  for(let g=1;g<=3;g++){
    const rr=R*g/3;
    let pts="";
    for(let i=0;i<4;i++){ const[px,py]=pt(i,rr); pts+=`${px.toFixed(1)},${py.toFixed(1)} `; }
    grid+=`<polygon points="${pts}" fill="none" stroke="#e2e8f0" stroke-width="1"/>`;
  }
  // 목표(L9) 외곽
  let goalPts="";
  for(let i=0;i<4;i++){ const[px,py]=pt(i,R); goalPts+=`${px.toFixed(1)},${py.toFixed(1)} `; }

  let axisLines="", labels="", dataPts="";
  axes.forEach(([nm,v],i)=>{
    const[ex,ey]=pt(i,R); axisLines+=`<line x1="${c}" y1="${c}" x2="${ex}" y2="${ey}" stroke="#e2e8f0" stroke-width="1"/>`;
    const[lx,ly]=pt(i,R+20); labels+=`<text x="${lx}" y="${ly}" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle" dominant-baseline="middle">${nm} ${v||0}</text>`;
    const[dx,dy]=pt(i, R*(v||0)/max); dataPts+=`${dx.toFixed(1)},${dy.toFixed(1)} `;
  });

  document.getElementById('radarBox').innerHTML=`
    <svg viewBox="0 0 ${size} ${size}" width="${size}" xmlns="http://www.w3.org/2000/svg">
      ${grid}
      <polygon points="${goalPts}" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4 3"/>

      <polygon points="${dataPts}" fill="rgba(47,111,237,.22)" stroke="#2f6fed" stroke-width="2.5"/>

      ${labels}
      <text x="${c}" y="${c-R-2}" font-size="9" fill="#16a34a" text-anchor="middle">- - 외곽=L9(고3) 목표</text>
    </svg>`;
}

/* ---- 공지창: 총평 + 정기평가 미응시 명단 ---- */
const NOW = new Date(2026,5,13); // 2026.06.13
function parseTestDate(str){
  if(!str) return null;
  const m=str.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
  if(!m) return null;
  return new Date(+m[1], +m[2]-1, +m[3]);
}
function monthsSince(d){
  if(!d) return null;
  return (NOW - d) / (1000*60*60*24*30.44);
}
function buildNotices(){
  const ids=Object.keys(DB.students);
  const n=ids.length;
  if(n===0) return '';

  // ---- 총평 통계 ----
  const lvCount={};
  const weakGrammar=[], weakReading=[], weakVocab=[];
  const gradeVocab={}; // 학년별 어휘량 합계/인원
  ids.forEach(id=>{
    const s=DB.students[id];
    const lv=s.overallLv||'-'; lvCount[lv]=(lvCount[lv]||0)+1;
    // 학년별 어휘량
    if(s.vocabSize){
      const g=s.grade||'기타';
      if(!gradeVocab[g]) gradeVocab[g]={sum:0,cnt:0};
      gradeVocab[g].sum+=s.vocabSize; gradeVocab[g].cnt++;
    }
    const ln=s.levelNum||{};
    const vals=[ln.word,ln.grammar,ln.reading,ln.listening].filter(v=>v);
    if(vals.length){
      const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
      if(ln.grammar && ln.grammar<=avg-1.5) weakGrammar.push(s.name);
      if(ln.reading && ln.reading<=avg-1.5) weakReading.push(s.name);
      if(ln.word && ln.word<=avg-1.5) weakVocab.push(s.name);
    }
  });

  // 학년별 평균 어휘량 (정렬: 초6, 중1, 중2, 중3, 그 외)
  const gradeOrder=["초6","중1","중2","중3","고1","고2","고3"];
  const gKeys=Object.keys(gradeVocab).sort((a,b)=>{
    const ia=gradeOrder.indexOf(a), ib=gradeOrder.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });
  let vocabByGrade = gKeys.map(g=>{
    const avg=Math.round(gradeVocab[g].sum/gradeVocab[g].cnt);
    return `<div style="flex:1;min-width:90px;background:#fff;border-radius:10px;padding:10px;text-align:center">
      <div style="font-size:12px;color:#6366f1;font-weight:700">${g}</div>
      <div style="font-size:20px;font-weight:900;color:var(--navy)">${avg.toLocaleString()}</div>
      <div style="font-size:10px;color:#94a3b8">단어 · ${gradeVocab[g].cnt}명</div>
    </div>`;
  }).join('');
  if(!vocabByGrade) vocabByGrade='<div style="color:#94a3b8;font-size:13px">어휘량 데이터 없음</div>';

  // 종합레벨 분포 막대그래프 (Lv.2~Lv.9 순)
  const lvOrder=["Lv.2","Lv.3","Lv.4","Lv.5","Lv.6","Lv.7","Lv.8","Lv.9"];
  const maxLv=Math.max(1,...Object.values(lvCount));
  let lvBars = lvOrder.filter(k=>lvCount[k]).map(k=>{
    const c=lvCount[k];
    const h=Math.round(c/maxLv*90)+10;
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="font-size:12px;font-weight:800;color:var(--navy)">${c}</div>
      <div style="width:100%;max-width:38px;height:${h}px;background:linear-gradient(180deg,#2f6fed,#7eb0ff);border-radius:6px 6px 0 0"></div>
      <div style="font-size:10px;color:#64748b;text-align:center;line-height:1.2">${lvWithGrade(k)}</div>
    </div>`;
  }).join('');
  if(!lvBars) lvBars='<div style="color:#94a3b8;font-size:13px">레벨 데이터 없음</div>';

  let weakLines='';
  if(weakGrammar.length) weakLines+=`<div>📕 <b>문법</b>이 상대적 약점: ${weakGrammar.join(', ')}</div>`;
  if(weakReading.length) weakLines+=`<div>📗 <b>독해</b>가 상대적 약점: ${weakReading.join(', ')}</div>`;
  if(weakVocab.length) weakLines+=`<div>📘 <b>어휘</b>가 상대적 약점: ${weakVocab.join(', ')}</div>`;
  if(!weakLines) weakLines='<div>영역별로 크게 치우친 학생은 없어요.</div>';

  // ---- 6개월 미응시 ----
  const overdue=[];
  ids.forEach(id=>{
    const s=DB.students[id];
    const d=parseTestDate(s.testDate);
    const mo=monthsSince(d);
    if(mo===null || mo>=6){ overdue.push({id, name:s.name, grade:s.grade, date:s.testDate||'미응시', d, mo}); }
  });
  overdue.sort((a,b)=>{
    if(!a.d && !b.d) return 0;
    if(!a.d) return -1;
    if(!b.d) return 1;
    return a.d - b.d;
  });
  let overdueRows = overdue.length===0
    ? '<div style="color:#16a34a;font-size:13px">🎉 최근 6개월 내 모든 학생이 정기평가에 응시했어요!</div>'
    : overdue.map((o,i)=>{
        const moTxt = o.mo===null? '응시 기록 없음' : `${Math.floor(o.mo)}개월 경과`;
        return `<div class="overdue-row">
          <span class="rank">${i+1}</span>
          <span class="nm">${o.name} <span style="color:#94a3b8;font-size:12px">${o.grade||''}</span></span>
          <span class="dt">${o.date}</span>
          <span class="mo">${moTxt}</span>
        </div>`;
      }).join('');

  return `
    <div class="notice-board">
      <details class="notice-card summary">
        <summary class="nt"><span>📣</span> 전체 총평 <span class="cnt">학생 ${n}명</span></summary>
        <div class="nbody" style="margin-top:12px">
          <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px">📘 학년별 평균 어휘량</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">${vocabByGrade}</div>
          <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px">📊 종합레벨 분포</div>
          <div style="display:flex;align-items:flex-end;gap:6px;height:130px;background:#fff;border-radius:10px;padding:12px 10px;margin-bottom:14px">${lvBars}</div>
          <div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:4px">⚠ 영역별 약점</div>
          ${weakLines}
        </div>
      </details>
      <details class="notice-card overdue">
        <summary class="nt"><span>⏰</span> 정기평가 미응시 (6개월+) <span class="cnt">${overdue.length}명</span></summary>
        <div class="nbody" style="margin-top:12px">
          <div style="font-size:12px;color:#94a3b8;margin-bottom:8px">가장 오래 안 본 학생부터 · 기준일 2026.06.13</div>
          ${overdueRows}
        </div>
      </details>
    </div>`;
}

function doBulk(){
  const raw=document.getElementById('bulkText').value.trim();
  if(!raw){ showToast('붙여넣은 내용이 없습니다'); return; }
  const lines=raw.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  let added=0, updated=0, errors=[];
  lines.forEach((line,idx)=>{
    const cols=line.split(/\t|,/).map(c=>c.trim());
    const [id0,pw,name,school,grade]=cols;
    const id=(id0||'').toLowerCase();
    if(!id||!name){ errors.push(`${idx+1}행: 아이디·이름 누락 → "${line}"`); return; }
    if(DB.students[id]){
      DB.students[id].name=name;
      if(pw) DB.students[id].pw=pw;
      DB.students[id].school=school||DB.students[id].school||"";
      DB.students[id].grade=grade||DB.students[id].grade||"";
      updated++;
    }else{
      DB.students[id]={
        pw:pw||"1234", name, school:school||"", grade:grade||"",
        level:{word:"",grammar:"",reading:"",listening:""},
        levelNum:{word:5,grammar:5,reading:5,listening:5},
        rank:{word:"",grammar:"",reading:"",listening:""},
        overallLv:"", overallRank:"", overallNum:5, testDate:"", vocabSize:0,
        book:"", bookMonths:2, startMonth:todayMonth, startYear:2026,
        todayStudy:"", todayHw:"", month:todayMonth,
        vocabBook:"", vocabDay:0, grammarBook:"", grammarCh:0, grammarPage:0, essayBook:"", essayCh:0, essayPage:0, usageBook:"", usageCh:0, usagePage:0, readingBook:"", readingCh:0, readingPage:0, mocks:{}, mocks:{}, readingBook:"", readingCh:0, readingPage:0, essayBook:"", essayCh:0,
    vocabBook:"", vocabDay:0,
        todayWordTotal:20, todayWordDone:0, todayHwTotal:3, todayHwDone:0,
        weeks:[{goal:"",done:false},{goal:"",done:false},{goal:"",done:false},{goal:"",done:false},{goal:"",done:false}]
      };
      added++;
    }
  });
  saveDB();
  const box=document.getElementById('bulkResult');
  box.innerHTML=`<div style="color:#16a34a;font-weight:700">✓ 신규 ${added}명 등록, ${updated}명 업데이트 완료</div>`+
    (errors.length?`<div style="color:#dc2626;margin-top:6px">⚠ ${errors.length}개 행 오류:<br>${errors.join('<br>')}</div>`:'');
  showToast(`등록 완료: 신규 ${added} · 수정 ${updated}`);
}

function saveStudent(isNew){
  const id = document.getElementById('f_id').value.trim().toLowerCase();
  const name = document.getElementById('f_name').value.trim();
  if(!id||!name){ showToast('이름과 아이디는 필수입니다'); return; }
  if(isNew && DB.students[id]){ showToast('이미 존재하는 아이디입니다'); return; }

  const weeks=[];
  for(let i=0;i<5;i++){
    weeks.push({
      goal: document.getElementById('wk_goal_'+i).value.trim(),
      done: document.getElementById('wk_done_'+i).checked
    });
  }

  // 모의고사 기록 수집
  const mocks={};
  Object.keys(MOCK_SETS).forEach(gk=>{
    mockList(gk).forEach(m=>{
      const id=`mock_${gk}_${m.key}`.replace(/-/g,'_');
      const chk=document.getElementById(id+'_chk');
      const sc=document.getElementById(id+'_sc');
      const hw=document.getElementById(id+'_hw');
      const hwd=document.getElementById(id+'_hwd');
      const isDone = chk && chk.checked;
      const isHw = hw && hw.checked;
      const isHwDone = hwd && hwd.checked;
      if(isDone || isHw || isHwDone){
        if(!mocks[gk]) mocks[gk]={};
        const v=sc?sc.value.trim():'';
        mocks[gk][m.key]={ done:!!isDone, score: v===''?null:Number(v), hw:!!isHw, hwDone:!!isHwDone };
      }
    });
  });

  const prev = DB.students[id] || {};
  DB.students[id]={
    pw: document.getElementById('f_pw').value,
    name,
    school: document.getElementById('f_school').value.trim(),
    grade: document.getElementById('f_grade').value.trim(),
    classGroup: document.getElementById('f_classGroup').value || '',
    level:{
      word: document.getElementById('f_lw').value,
      grammar: document.getElementById('f_lg').value,
      reading: document.getElementById('f_lr').value,
      listening: document.getElementById('f_ll').value
    },
    rank:{
      word: document.getElementById('f_rw').value,
      grammar: document.getElementById('f_rg').value,
      reading: document.getElementById('f_rr').value,
      listening: document.getElementById('f_rl').value
    },
    overallLv: document.getElementById('f_olv').value,
    overallRank: document.getElementById('f_ork').value,
    testDate: document.getElementById('f_td').value,
    vocabSize: parseInt(document.getElementById('f_vs').value)||0,
    overallNum: parseInt(document.getElementById('f_on').value)||5,
    levelNum:{
      word: parseInt(document.getElementById('f_nw').value)||5,
      grammar: parseInt(document.getElementById('f_ng').value)||5,
      reading: parseInt(document.getElementById('f_nr').value)||5,
      listening: parseInt(document.getElementById('f_nl').value)||5
    },
    book: prev.book||'',
    bookMonths: prev.bookMonths||1,
    startMonth: prev.startMonth,
    startYear: prev.startYear,
    todayStudy: prev.todayStudy||'',
    todayHw: prev.todayHw||'',
    month: parseInt(document.getElementById('f_month').value),
    vocabBook: document.getElementById('f_vbook').value,
    vocabDay: parseInt(document.getElementById('f_vday').value)||0,
    vocabTodayStudy: (document.getElementById('f_vts')||{}).value||'',
    vocabTodayHw: (document.getElementById('f_vth')||{}).value||'',
    grammarBook: document.getElementById('f_gbook').value,
    grammarCh: parseInt(document.getElementById('f_gch').value)||0,
    grammarPage: parseInt(document.getElementById('f_gpage').value)||0,
    grammarHw: (document.getElementById('f_ghw')||{}).value||'',
    essayBook: document.getElementById('f_ebook').value,
    essayCh: parseInt(document.getElementById('f_ech').value)||0,
    essayPage: parseInt(document.getElementById('f_epage').value)||0,
    essayHw: (document.getElementById('f_ehw')||{}).value||'',
    usageBook: document.getElementById('f_ubook').value,
    usageCh: parseInt(document.getElementById('f_uch').value)||0,
    usagePage: parseInt(document.getElementById('f_upage').value)||0,
    usageHw: (document.getElementById('f_uhw')||{}).value||'',
    readingBook: document.getElementById('f_rbook').value,
    readingCh: parseInt(document.getElementById('f_rch').value)||0,
    readingPage: parseInt(document.getElementById('f_rpage').value)||0,
    readingHw: (document.getElementById('f_rhw')||{}).value||'',
    mocks,
    todayWordDone: prev.todayWordDone||0,
    todayWordTotal: prev.todayWordTotal||0,
    todayHwDone: prev.todayHwDone||0,
    todayHwTotal: prev.todayHwTotal||0,
    weeks
  };
  saveDB();
  showToast('저장되었습니다 ✓');
  editingId=null; teacherTab='list'; renderTeacher();
}

function deleteStudent(id){
  if(confirm(DB.students[id].name+' 학생을 삭제할까요?')){
    delete DB.students[id];
    saveDB();
    showToast('삭제되었습니다');
    editingId=null; teacherTab='list'; renderTeacher();
  }
}

/* ---- 백업 / 복원 / 초기화 ---- */
function exportBackup(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();
  a.href=url; a.download=`조민규영어_백업_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('백업 파일을 내려받았어요 ✓');
}
function importBackup(ev){
  const file=ev.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.students){ showToast('올바른 백업 파일이 아닙니다'); return; }
      DB=data; saveDB();
      showToast('백업을 불러왔어요 ✓');
      teacherTab='list'; renderTeacher();
    }catch(err){ showToast('파일을 읽을 수 없습니다'); }
  };
  reader.readAsText(file);
}
function resetAll(){
  if(confirm('모든 학생 데이터를 삭제하고 초기화할까요? 되돌릴 수 없습니다.\n(먼저 백업 내보내기를 권장합니다)')){
    DB={ teacher:{pw:DB.teacher.pw||"1234"}, students:{} };
    saveDB();
    showToast('초기화되었습니다');
    teacherTab='list'; renderTeacher();
  }
}

    <div class="modal">
      <h3>💬 학부모 카톡 발송 요약</h3>
      <div class="sub">아래 내용을 복사해서 카카오톡에 붙여넣으세요.</div>
      <textarea id="kakaoText">${text}</textarea>
      <div class="actions">
        <button class="btn btn-kakao" onclick="copyKakao()">📋 복사하기</button>
        <button class="btn btn-ghost" onclick="this.closest('.modal-bg').remove()">닫기</button>
      </div>
    </div>`;
  bg.addEventListener('click',e=>{ if(e.target===bg) bg.remove(); });
  document.body.appendChild(bg);
}
function copyKakao(){
  const t=document.getElementById('kakaoText');
  t.select();
  navigator.clipboard.writeText(t.value).then(()=>showToast('복사완료! 카톡에 붙여넣으세요 ✓'))
    .catch(()=>{ document.execCommand('copy'); showToast('복사완료 ✓'); });
}

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer=null;
function showToast(msg){
  const old=document.querySelector('.toast'); if(old) old.remove();
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.remove(),2200);
}
</script>
</body>
</html>
